# fly.toml app configuration file generated for evoagentx-server on 2025-08-14T11:07:06+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'evoagentx-server'
primary_region = 'sea'

[env]
  LOG_LEVEL = 'warning'
  SUPPRESS_WARNINGS = 'true'
  VERBOSE_STARTUP = 'false'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10m0s'
    timeout = '10m40s'
    grace_period = '600s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 4
