app = 'evoagentx-server'
primary_region = 'sea'

[env]
  LOG_LEVEL = 'warning'
  SUPPRESS_WARNINGS = 'true'
  VERBOSE_STARTUP = 'false'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  interval = '600s'
  timeout = '100s'
  grace_period = '30s'
  method = 'GET'
  path = '/health'
  protocol = 'http'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1